# =============================================================================
#  CONFIGURACIÓN DE NGINX — Parte 1
# =============================================================================
#  Nginx es uno de los servidores web más usados en el mundo.
#  Esta configuración aplica buenas prácticas de seguridad y rendimiento.
# =============================================================================

# ── Contexto global ──────────────────────────────────────────────────────────

# Número de workers = cantidad de CPUs disponibles (auto lo detecta solo)
worker_processes auto;

# Límite de conexiones abiertas por worker. En producción se ajusta
# según la carga esperada.
worker_rlimit_nofile 1024;

# Dónde escribir los errores del proceso principal
error_log /var/log/nginx/error.log warn;

# Archivo con el PID del proceso master (útil para enviarle señales)
pid /tmp/nginx.pid;

# ── Contexto events ──────────────────────────────────────────────────────────
events {
    # Máximo de conexiones simultáneas por worker
    worker_connections 512;

    # epoll es el mecanismo más eficiente en Linux para I/O no bloqueante
    use epoll;

    # Acepta todas las conexiones pendientes de una vez (más eficiente)
    multi_accept on;
}

# ── Contexto HTTP ─────────────────────────────────────────────────────────────
http {
    # Ocultar la versión de Nginx en headers y páginas de error.
    # ⚠️  Esta directiva SOLO es válida dentro del bloque http{} (o server{}/location{})
    # Ponerla en el contexto global causa el error: "not allowed here"
    server_tokens off;

    # Tipos MIME: le dice al navegador qué tipo de archivo recibe
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Seguridad: Headers HTTP ───────────────────────────────────────────────
    # Estos headers son instrucciones de seguridad que el navegador obedece:

    # Evita que el navegador "adivine" el tipo MIME (evita ataques MIME sniffing)
    add_header X-Content-Type-Options  "nosniff"       always;

    # Evita que la página se cargue dentro de un iframe (clickjacking)
    add_header X-Frame-Options         "SAMEORIGIN"    always;

    # Activa el filtro XSS del navegador (protección básica contra scripts maliciosos)
    add_header X-XSS-Protection        "1; mode=block" always;

    # Política de referrer: no enviar la URL completa como referrer a otros sitios
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;

    # ── Rendimiento ───────────────────────────────────────────────────────────

    # sendfile: el kernel transfiere archivos directamente a la red sin
    # pasar por el espacio de usuario (mucho más eficiente para archivos estáticos)
    sendfile on;

    # tcp_nopush: acumula datos antes de enviar (reduce paquetes TCP, mejor para
    # archivos grandes combinado con sendfile)
    tcp_nopush on;

    # Compresión gzip: reduce el tamaño de la respuesta enviada al navegador
    gzip on;
    gzip_vary on;              # Añade "Vary: Accept-Encoding" al header
    gzip_min_length 256;       # Solo comprimir archivos > 256 bytes
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    # Evitan que conexiones colgadas consuman recursos indefinidamente

    keepalive_timeout  30;      # Tiempo máximo de conexión keep-alive
    send_timeout       10;      # Tiempo máximo para enviar una respuesta
    client_header_timeout 10;   # Tiempo para recibir headers del cliente

    # ── Logs ──────────────────────────────────────────────────────────────────
    # Formato y destino de los logs de acceso
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # ── Servidor virtual (VirtualHost) ────────────────────────────────────────
    server {
        # Escuchamos en el puerto 8080 porque corremos como usuario no-root.
        # Los puertos < 1024 requieren privilegios de root en Linux.
        listen 8080;

        # Nombre del servidor (en local usamos "localhost" o "_" como catch-all)
        server_name localhost;

        # Directorio raíz donde están los archivos HTML
        # ⚠️ Este directorio será MONTADO como volumen desde el host
        root /usr/share/nginx/html;

        # Archivo por defecto al acceder a una ruta sin nombre de archivo
        index index.html;

        # ── Ruta principal ────────────────────────────────────────────────────
        location / {
            # try_files: busca el archivo pedido; si no existe, devuelve 404
            try_files $uri $uri/ =404;

            # Cache para activos estáticos: el navegador los guarda 1 hora
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }

        # ── Endpoint de salud (healthcheck) ──────────────────────────────────
        # Ruta especial que solo devuelve "OK". No loguea (evita ruido en logs).
        # Docker usa este endpoint para verificar que el contenedor funciona.
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── Páginas de error personalizadas ───────────────────────────────────
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
