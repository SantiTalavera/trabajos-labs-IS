<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Lab — Parte 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 50px 60px;
      text-align: center;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .whale { font-size: 80px; margin-bottom: 20px; }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: #61dafb;
    }

    .subtitle {
      font-size: 1rem;
      color: #a0c4d8;
      margin-bottom: 30px;
    }

    .badge {
      display: inline-block;
      background: rgba(97,218,251,0.15);
      border: 1px solid #61dafb;
      color: #61dafb;
      border-radius: 30px;
      padding: 6px 18px;
      font-size: 0.85rem;
      margin: 5px;
    }

    .info {
      margin-top: 30px;
      font-size: 0.85rem;
      color: #7fa8ba;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="whale">🐋</div>
    <h1>¡Hola, IS!</h1>
    <p class="subtitle">Parte 1 — Nginx + Volumen Local</p>

    <div>
      <span class="badge">🐳 Docker</span>
      <span class="badge">🌐 Nginx</span>
      <span class="badge">💾 Volumen</span>
    </div>

    <p class="info">
      Este archivo HTML está siendo servido desde un <strong>volumen local</strong>.<br />
      Editá este archivo y recargá el navegador para ver los cambios. 
    </p>
  </div>
</body>
</html>
