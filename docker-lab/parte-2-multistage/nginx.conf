# =============================================================================
#  CONFIGURACIÓN DE NGINX — Parte 2 (Multi-Stage)
#  Idéntica a la Parte 1 pero con caché más agresivo para producción
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 2048;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # server_tokens DEBE ir dentro de http{} — no en el contexto global
    server_tokens off;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Headers de seguridad ──────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;

    # Content-Security-Policy: restringe qué recursos puede cargar la página.
    # Es una de las defensas más efectivas contra XSS.
    # En producción se ajusta según los dominios reales que uses.
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'" always;

    # ── Rendimiento ───────────────────────────────────────────────────────────
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Compresión gzip
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;          # Balance entre CPU y ratio de compresión
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    keepalive_timeout  65;
    keepalive_requests 100;
    send_timeout       10;
    client_header_timeout 10;
    client_body_timeout   10;

    # ── Logs ──────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # ── Servidor virtual ──────────────────────────────────────────────────────
    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # ── Activos estáticos con caché agresivo ──────────────────────────────
        # Los archivos con hash en el nombre (ej: main.a3f2d1.js) nunca cambian,
        # así que los cacheamos "para siempre" (1 año).
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;    # No loguear assets estáticos (reduce I/O)
        }

        # ── HTML: nunca cachear ───────────────────────────────────────────────
        # El HTML es el punto de entrada. Si cacheamos el HTML, el usuario
        # puede recibir una versión vieja que referencia JS/CSS viejos también.
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # ── Ruta principal ────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            # "/index.html" como fallback permite SPA (Single Page Applications)
            # como React Router o Vue Router funcionar correctamente con rutas
            # del lado del cliente (client-side routing)
        }

        # ── Endpoint de salud ─────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── Bloquear archivos ocultos ─────────────────────────────────────────
        # Archivos como .git, .env, .htpasswd no deben ser accesibles por HTTP
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Páginas de error ──────────────────────────────────────────────────
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
