<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Lab — Parte 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,200,0,0.3);
      border-radius: 20px;
      padding: 50px 60px;
      text-align: center;
      max-width: 580px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,200,0,0.05);
    }

    .icon { font-size: 80px; margin-bottom: 20px; }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 1rem;
      color: #8a9bb0;
      margin-bottom: 30px;
    }

    .badge {
      display: inline-block;
      background: rgba(255,200,0,0.1);
      border: 1px solid #ffd700;
      color: #ffd700;
      border-radius: 30px;
      padding: 6px 18px;
      font-size: 0.85rem;
      margin: 5px;
    }

    .info {
      margin-top: 30px;
      font-size: 0.85rem;
      color: #6a7d8f;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚡</div>
    <h1>Multi-Stage Build</h1>
    <p class="subtitle">Parte 2 — Build optimizado + Hot Reload</p>

    <div>
      <span class="badge"> Multi-Stage</span>
      <span class="badge"> Nginx</span>
      <span class="badge"> Live Reload</span>
    </div>

    <p class="info">
      Esta imagen fue construida con un proceso <strong>multi-stage</strong>.<br />
      En modo <strong>desarrollo</strong>, los cambios se reflejan en tiempo real.<br />
      En modo <strong>producción</strong>, la imagen es mínima y optimizada. 
    </p>
  </div>
</body>
</html>
